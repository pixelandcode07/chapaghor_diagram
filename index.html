<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0F172A;font-family:'Inter',sans-serif;overflow:hidden;height:100vh;user-select:none}
#toolbar{background:#0F172A;color:white;padding:0 14px;display:flex;align-items:center;gap:10px;height:48px;border-bottom:1px solid #1E293B;flex-shrink:0;position:relative;z-index:50}
.tb-logo{font-size:11px;font-weight:700;color:#60A5FA;letter-spacing:.5px}.tb-sub{font-size:9px;color:#475569}
.tb-sep{color:#1E293B;font-size:18px}
.zoom-controls{display:flex;gap:3px;align-items:center}
.zoom-btn{background:#1E293B;border:1px solid #334155;color:#94A3B8;width:28px;height:28px;border-radius:5px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.zoom-btn:hover{background:#2563EB;color:white;border-color:#2563EB}
#zoom-lbl{color:#64748B;font-size:10px;min-width:38px;text-align:center;font-variant-numeric:tabular-nums}
.legend{display:flex;gap:10px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:4px;font-size:9.5px;color:#94A3B8;white-space:nowrap}
.ld{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.stats{font-size:9px;color:#334155;margin-left:auto;text-align:right;line-height:1.6}
#vp{width:100vw;height:calc(100vh - 48px);overflow:hidden;cursor:grab;position:relative;background:
  radial-gradient(circle at 20% 20%, rgba(37,99,235,0.04) 0%, transparent 50%),
  radial-gradient(circle at 80% 80%, rgba(109,40,217,0.04) 0%, transparent 50%),
  #0F172A}
#vp::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,#1E293B 1px,transparent 1px);background-size:28px 28px;pointer-events:none;opacity:.5}
#vp.drag{cursor:grabbing}
#cv{position:absolute;transform-origin:0 0;width:5200px;height:3600px}
#svgl{position:absolute;top:0;left:0;width:5200px;height:3600px;pointer-events:none;overflow:visible}
.sb{position:absolute;border-radius:14px;border:1.5px dashed;pointer-events:none}
.sl{position:absolute;font-size:9.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;opacity:.5;pointer-events:none}
.cb{position:absolute;width:248px;background:#0F172A;border-radius:8px;box-shadow:0 0 0 1.5px #1E293B,0 8px 32px rgba(0,0,0,.5);overflow:hidden;transition:box-shadow .2s}
.cb:hover{box-shadow:0 0 0 1.5px #2563EB,0 12px 40px rgba(37,99,235,.25);z-index:100}
.ch{padding:8px 10px;display:flex;align-items:center;gap:7px;font-weight:700;font-size:11.5px;color:white}
.ci{font-size:13px;line-height:1}
.cd{background:#080F1A;padding:3px 10px;font-size:8.5px;color:#475569;border-bottom:1px solid #1E293B;font-style:italic;line-height:1.5}
.fr{display:flex;align-items:center;padding:2px 8px;gap:5px;border-bottom:.5px solid #0F172A;min-height:20px}
.fr:nth-child(even){background:#080F1A}
.fb{width:14px;height:14px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:7.5px;flex-shrink:0}
.fpk{background:#422006;color:#F59E0B}
.ffk{background:#052E16;color:#22C55E}
.fidx{background:#0F172A;color:#60A5FA;border:1px solid #1E3A5F}
.fe{opacity:0}
.fn{color:#E2E8F0;font-size:9.5px;font-family:'JetBrains Mono',monospace;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fn.pk{color:#F59E0B}
.fn.fk{color:#22C55E}
.fn.idx{color:#60A5FA}
.ft{color:#334155;font-size:8.5px;font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px}

  core:{hdr:'#1B4FD8',bdr:'#1E3A5F',bg:'rgba(37,99,235,0.06)'},
  a:{hdr:'#5B21B6',bdr:'#3B1872',bg:'rgba(124,58,237,0.06)'},
  b:{hdr:'#065F46',bdr:'#064E3B',bg:'rgba(5,150,105,0.06)'},
  c:{hdr:'#991B1B',bdr:'#7F1D1D',bg:'rgba(220,38,38,0.06)'},
  admin:{hdr:'#1E293B',bdr:'#334155',bg:'rgba(51,65,85,0.06)'}
};

const RELS=[
  ['users','addresses','1:N','#2563EB'],
  ['users','refresh_tokens','1:N','#2563EB'],
  ['users','notifications','1:N','#2563EB'],
  ['users','cart_items','1:N','#2563EB'],
  ['users','orders','1:N','#2563EB'],
  ['orders','order_items','1:N','#3B82F6'],
  ['orders','payments','1:N','#3B82F6'],
  ['orders','invoices','1:1','#3B82F6'],
  ['orders','notifications','1:N','#3B82F6'],
  ['addresses','orders','REF','#60A5FA'],
  ['print_categories','print_attribute_groups','1:N','#8B5CF6'],
  ['print_attribute_groups','print_attribute_options','1:N','#8B5CF6'],
  ['users','print_quote_requests','1:N','#8B5CF6'],
  ['print_categories','print_quote_requests','1:N','#A78BFA'],
  ['print_quote_requests','quotations','1:1','#8B5CF6'],
  ['quotations','orders','TRIGGER','#7C3AED'],
  ['media_types','media_addons','1:N','#10B981'],
  ['media_types','banner_order_items','1:N','#10B981'],
  ['orders','banner_order_items','1:N','#10B981'],
  ['media_types','dimension_price_log','LOG','#059669'],
  ['product_categories','products','1:N','#EF4444'],
  ['products','product_variants','1:N','#EF4444'],
  ['products','product_reviews','1:N','#EF4444'],
  ['users','wishlists','1:N','#F87171'],
  ['products','wishlists','M:N','#F87171'],
  ['orders','product_reviews','VERIFIED','#EF4444'],
  ['users','admin_activity_log','LOG','#64748B'],
  ['users','site_config','REF','#64748B'],
];

const BW=248;
const FH=20;
const HH=34;
const DH=22;
function bh(col){return HH+DH+col.f.length*FH+2}

function renderSections(){
  const bc=document.getElementById('bc');
  const secs=[
    {lbl:'CORE — AUTH & USERS',x:40,y:40,w:1410,h:500,m:'core'},
    {lbl:'CORE — CART, ORDERS & PAYMENTS',x:40,y:555,w:1700,h:540,m:'core'},
    {lbl:'MODULE A — CUSTOM PRINT QUOTE SYSTEM',x:40,y:1180,w:1410,h:540,m:'a'},
    {lbl:'MODULE B — BANNER / SIGNAGE',x:1730,y:40,w:600,h:1090,m:'b'},
    {lbl:'MODULE C — E-COMMERCE & MERCHANDISE',x:1730,y:1180,w:880,h:780,m:'c'},
    {lbl:'ADMIN CONFIG & WEBSITE SETTINGS',x:40,y:1800,w:1700,h:500,m:'admin'},
  ];
  secs.forEach(s=>{
    const c=MC[s.m];
    const d=document.createElement('div');
    d.className='sb';
    d.style.cssText=`left:${s.x}px;top:${s.y}px;width:${s.w}px;height:${s.h}px;border-color:${c.bdr};background:${c.bg}`;
    bc.appendChild(d);
    const l=document.createElement('div');
    l.className='sl';
    l.style.cssText=`left:${s.x+14}px;top:${s.y+7}px;color:${c.hdr}`;
    l.textContent=s.lbl;
    bc.appendChild(l);
  });
}

function renderBoxes(){
  const bc=document.getElementById('bc');
  C.forEach(col=>{
    const c=MC[col.m];
    const box=document.createElement('div');
    box.className='cb';box.id='bx-'+col.id;
    box.style.cssText=`left:${col.x}px;top:${col.y}px;box-shadow:0 0 0 1.5px ${c.bdr},0 8px 32px rgba(0,0,0,.5)`;
    let h=`<div class="ch" style="background:${c.hdr}"><span class="ci">${col.icon}</span><span>${col.name}</span></div><div class="cd">${col.desc}</div>`;
    col.f.forEach(f=>{
      let badge='',cls='';
      if(f.b==='pk'){badge='<div class="fb fpk">PK</div>';cls='pk';}
      else if(f.b==='fk'){badge='<div class="fb ffk">FK</div>';cls='fk';}
      else if(f.b==='idx'){badge='<div class="fb fidx">⚡</div>';cls='idx';}
      else badge='<div class="fb fe">·</div>';
      h+=`<div class="fr">${badge}<span class="fn ${cls}">${f.n}</span><span class="ft">${f.t}</span></div>`;
    });
    box.innerHTML=h;bc.appendChild(box);
  });
}

function getBox(id){return C.find(c=>c.id===id)}
function mid(col){const h=bh(col);return{x:col.x+BW/2,y:col.y+h/2}}
function edge(col,side){
  const h=bh(col);
  if(side==='r')return{x:col.x+BW,y:col.y+h/2};
  if(side==='l')return{x:col.x,y:col.y+h/2};
  if(side==='b')return{x:col.x+BW/2,y:col.y+h};
  return{x:col.x+BW/2,y:col.y};
}

function renderLines(){
  const svg=document.getElementById('svgl');
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  const cols=['#2563EB','#3B82F6','#60A5FA','#8B5CF6','#A78BFA','#7C3AED','#10B981','#059669','#EF4444','#F87171','#64748B'];
  cols.forEach((c,i)=>{
    ['arrow','arrow-start'].forEach((nm,j)=>{
      const mk=document.createElementNS('http://www.w3.org/2000/svg','marker');
      mk.setAttribute('id',`mk-${i}-${j}`);mk.setAttribute('markerWidth','8');mk.setAttribute('markerHeight','8');
      mk.setAttribute('refX',j?'2':'6');mk.setAttribute('refY','3');mk.setAttribute('orient','auto');
      mk.setAttribute('markerUnits','userSpaceOnUse');
      const p=document.createElementNS('http://www.w3.org/2000/svg','path');
      p.setAttribute('d',j?'M8,0 L8,6 L0,3 z':'M0,0 L0,6 L8,3 z');p.setAttribute('fill',c);mk.appendChild(p);defs.appendChild(mk);
    });
  });
  svg.appendChild(defs);
  const ci=(c)=>cols.indexOf(c)<0?10:cols.indexOf(c);
  RELS.forEach(([fid,tid,lbl,clr])=>{
    const f=getBox(fid),t=getBox(tid);if(!f||!t)return;
    const fh=bh(f),th=bh(t);
    const fcx=f.x+BW/2,tcx=t.x+BW/2,fcy=f.y+fh/2,tcy=t.y+th/2;
    let x1,y1,x2,y2;
    if(Math.abs(fcx-tcx)>Math.abs(fcy-tcy)){
      if(fcx<tcx){x1=f.x+BW;y1=fcy;x2=t.x;y2=tcy;}
      else{x1=f.x;y1=fcy;x2=t.x+BW;y2=tcy;}
    }else{
      if(fcy<tcy){x1=fcx;y1=f.y+fh;x2=tcx;y2=t.y;}
      else{x1=fcx;y1=f.y;x2=tcx;y2=t.y+th;}
    }
    const dx=x2-x1,dy=y2-y1;
    const cx1=x1+dx*.45,cy1=y1,cx2=x1+dx*.55,cy2=y2;
    const idx=ci(clr);
    const isDash=lbl==='TRIGGER'||lbl==='LOG'||lbl==='REF'||lbl==='VERIFIED';
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M${x1},${y1} C${cx1},${cy1} ${cx2},${cy2} ${x2},${y2}`);
    p.setAttribute('stroke',clr);p.setAttribute('stroke-width','1.4');p.setAttribute('fill','none');
    p.setAttribute('stroke-dasharray',isDash?'6,3':'none');
    p.setAttribute('marker-end',`url(#mk-${idx}-0)`);p.setAttribute('opacity','.7');svg.appendChild(p);
    // circle at start
    const cc=document.createElementNS('http://www.w3.org/2000/svg','circle');
    cc.setAttribute('cx',x1);cc.setAttribute('cy',y1);cc.setAttribute('r','3');
    cc.setAttribute('fill',clr);cc.setAttribute('opacity','.8');svg.appendChild(cc);
    const mx=(x1+x2)/2,my=(y1+y2)/2;
    const rw=Math.max(lbl.length*5.5,20);
    const rct=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rct.setAttribute('x',mx-rw/2);rct.setAttribute('y',my-8);rct.setAttribute('width',rw);
    rct.setAttribute('height',15);rct.setAttribute('fill','#080F1A');rct.setAttribute('rx',3);
    rct.setAttribute('stroke',clr);rct.setAttribute('stroke-width','.7');svg.appendChild(rct);
    const tx=document.createElementNS('http://www.w3.org/2000/svg','text');
    tx.setAttribute('x',mx);tx.setAttribute('y',my+3.5);tx.setAttribute('text-anchor','middle');
    tx.setAttribute('font-size','8');tx.setAttribute('fill',clr);tx.setAttribute('font-family','JetBrains Mono,monospace');
    tx.setAttribute('font-weight','600');tx.textContent=lbl;svg.appendChild(tx);
  });
}

// ─── PAN & ZOOM ───────────────────────────────────────────────────────────────
let sc=0.5,px=30,py=30,drag=false,lx,ly;
function at(){
  document.getElementById('cv').style.transform=`translate(${px}px,${py}px) scale(${sc})`;
  document.getElementById('zoom-lbl').textContent=Math.round(sc*100)+'%';
}
function sz(s){sc=Math.max(.1,Math.min(3,s));at()}
function rv(){sc=.5;px=30;py=30;at()}
function fv(){
  const vp=document.getElementById('vp');
  const s=Math.min(vp.clientWidth/2600,vp.clientHeight/2400)*.9;
  sc=s;px=(vp.clientWidth-2600*s)/2;py=(vp.clientHeight-2400*s)/2;at();
}
const vp=document.getElementById('vp');
vp.addEventListener('mousedown',e=>{if(e.button!==0)return;drag=true;lx=e.clientX;ly=e.clientY;vp.classList.add('drag')});
window.addEventListener('mousemove',e=>{if(!drag)return;px+=e.clientX-lx;py+=e.clientY-ly;lx=e.clientX;ly=e.clientY;at()});
window.addEventListener('mouseup',()=>{drag=false;vp.classList.remove('drag')});
vp.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=vp.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const d=e.deltaY>0?.88:1.12,ns=Math.max(.1,Math.min(3,sc*d));
  px=mx-(mx-px)*(ns/sc);py=my-(my-py)*(ns/sc);sc=ns;at();
},{passive:false});
// touch
let ltd=null;
vp.addEventListener('touchstart',e=>{
  if(e.touches.length===1){drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;}
  else if(e.touches.length===2)ltd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
},{passive:true});
vp.addEventListener('touchmove',e=>{
  if(e.touches.length===1&&drag){px+=e.touches[0].clientX-lx;py+=e.touches[0].clientY-ly;lx=e.touches[0].clientX;ly=e.touches[0].clientY;at();}
  else if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);if(ltd)sz(sc*d/ltd);ltd=d;}
},{passive:true});
vp.addEventListener('touchend',()=>{drag=false;ltd=null});

renderSections();
renderBoxes();
renderLines();
at();
</script>
